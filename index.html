<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALLAVI</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}

:root{
  --void:#000005;
  --deep-blue:#020215;
  --mid-blue:#050535;
  --sky-blue:#0a0a60;
  --glow-blue:#1133ff;
  --ice-blue:#4488ff;
  --pale-blue:#aaccff;
  --blood:#8b0000;
  --blood-bright:#cc0000;
  --blood-drip:#ff1100;
  --lava:#ff4400;
  --lava-glow:#ff6600;
  --lava-pale:#ffaa44;
}

body{
  background:var(--void);
  color:var(--pale-blue);
  font-family:'Special Elite',serif;
  overflow-x:hidden;
  cursor:none;
  min-height:100vh;
}

/* ══ SCANLINES ══ */
body::after{
  content:'';position:fixed;inset:0;z-index:9998;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,5,0.15) 3px,rgba(0,0,5,0.15) 4px);
  pointer-events:none;
  animation:scan 0.1s steps(1) infinite;
}
@keyframes scan{
  0%{background-position:0 0}
  100%{background-position:0 4px}
}

/* ══ CUSTOM CURSOR ══ */
#cursor{
  position:fixed;z-index:9999;pointer-events:none;
  width:20px;height:20px;
  border:2px solid var(--blood-drip);
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px var(--blood-drip),0 0 20px var(--blood);
  transition:transform 0.1s ease;
  mix-blend-mode:screen;
}
#cursor-dot{
  position:fixed;z-index:9999;pointer-events:none;
  width:4px;height:4px;border-radius:50%;
  background:var(--blood-drip);
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px var(--blood-drip);
}

/* ══ MOUNTAIN CANVAS HERO ══ */
#hero-canvas{
  position:relative;width:100%;height:100vh;overflow:hidden;
  background:linear-gradient(180deg,
    #000820 0%,#000d40 15%,#001060 30%,
    #000830 55%,#0a0005 70%,#000000 100%
  );
}

canvas#mountain-canvas{
  position:absolute;bottom:0;left:0;width:100%;height:100%;
}

/* ══ BLOOD TITLE ══ */
.title-container{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;
}

.blood-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(4rem,14vw,11rem);
  font-weight:900;
  letter-spacing:0.15em;
  position:relative;
  color:transparent;
  -webkit-text-stroke:3px var(--blood-drip);
  text-stroke:3px var(--blood-drip);
  filter:drop-shadow(0 0 30px var(--blood)) drop-shadow(0 0 60px var(--blood-bright));
  animation:titlePulse 2s ease-in-out infinite, bloodDrip 0.05s step-end infinite;
  user-select:none;
}

/* SVG blood drip text fill via filter */
.blood-title::before{
  content:'PALLAVI';
  position:absolute;inset:0;
  color:var(--blood-drip);
  -webkit-text-stroke:0px transparent;
  text-stroke:0;
  clip-path:inset(0 0 80% 0);
  animation:bloodFill 4s ease-in forwards, dripsDown 8s ease-in-out 2s infinite;
}

@keyframes bloodFill{
  0%{clip-path:inset(0 0 100% 0);opacity:0}
  30%{opacity:1}
  100%{clip-path:inset(0 0 0% 0)}
}
@keyframes dripsDown{
  0%,100%{clip-path:inset(0 0 0% 0)}
  50%{clip-path:inset(0 0 -5% 0)}
}
@keyframes titlePulse{
  0%,100%{filter:drop-shadow(0 0 30px var(--blood)) drop-shadow(0 0 60px var(--blood-bright))}
  50%{filter:drop-shadow(0 0 60px var(--blood-drip)) drop-shadow(0 0 100px var(--blood-bright)) drop-shadow(0 0 5px #fff)}
}
@keyframes bloodDrip{
  0%,96%,100%{opacity:1}97%{opacity:0.85}
}

.subtitle{
  font-family:'Creepster',cursive;
  font-size:clamp(0.9rem,2.5vw,1.4rem);
  letter-spacing:0.5em;
  color:var(--blood-bright);
  text-transform:uppercase;
  margin-top:20px;
  text-shadow:0 0 20px var(--blood);
  animation:subFlicker 6s step-end infinite;
}
@keyframes subFlicker{
  0%,88%,92%,100%{opacity:0.9}89%{opacity:0}91%{opacity:0.5}
}

/* ══ BLOOD DRIPS FROM TOP ══ */
.blood-drip-bar{
  position:fixed;top:0;left:0;right:0;z-index:9990;
  height:5px;
  background:linear-gradient(90deg,var(--blood),var(--blood-drip),var(--blood-bright),var(--blood-drip),var(--blood));
  box-shadow:0 0 20px var(--blood-drip),0 0 40px var(--blood);
}
.drip-wrap{position:fixed;top:5px;left:0;right:0;z-index:9989;pointer-events:none;height:200px;overflow:hidden}
.drip{
  position:absolute;top:0;
  width:3px;border-radius:0 0 50% 50%;
  background:linear-gradient(to bottom,var(--blood-drip),var(--blood),rgba(139,0,0,0));
  animation:dripFall var(--d,4s) ease-in var(--dl,0s) infinite;
  opacity:0;
}
@keyframes dripFall{
  0%{height:0;opacity:1;transform:scaleY(0)}
  20%{opacity:1}
  70%{height:var(--h,80px);opacity:0.9}
  100%{height:var(--h,80px);opacity:0;transform:translateY(10px)}
}

/* ══ GHOST SECTIONS ══ */
.ghost-section{
  position:relative;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  padding:80px 20px;
}

.gs-1{background:linear-gradient(180deg,#000000,#010020,#000000)}
.gs-2{background:linear-gradient(180deg,#000000,#020005,#000000)}
.gs-3{background:linear-gradient(180deg,#000000,#050000,#000000)}
.gs-4{background:linear-gradient(180deg,#000000,#000515,#000000)}
.gs-5{background:linear-gradient(180deg,#000000,#080000,#000000)}

/* ghost apparition */
.ghost-apparition{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transform:translateY(40px);
  transition:opacity 1.5s ease, transform 1.5s ease;
  pointer-events:none;
}
.ghost-apparition.visible{opacity:1;transform:translateY(0)}

/* SVG ghost characters drawn purely in CSS */
.ghost-svg{
  position:absolute;
  filter:drop-shadow(0 0 30px var(--glow-color,var(--glow-blue)));
  animation:ghostFloat var(--gf,6s) ease-in-out infinite;
}
@keyframes ghostFloat{
  0%,100%{transform:translateY(0) rotate(-2deg)}
  33%{transform:translateY(-25px) rotate(1deg)}
  66%{transform:translateY(-10px) rotate(-1deg)}
}

.ghost-content{
  position:relative;z-index:10;
  max-width:700px;text-align:center;
  background:rgba(0,0,10,0.7);
  border:1px solid rgba(100,100,255,0.15);
  border-radius:2px;
  padding:50px 40px;
  backdrop-filter:blur(4px);
  transform:translateY(60px);
  opacity:0;
  transition:transform 1.2s ease 0.3s, opacity 1.2s ease 0.3s;
}
.ghost-content.visible{transform:translateY(0);opacity:1}

.ghost-name{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.5rem,4vw,2.5rem);
  font-weight:900;
  margin-bottom:8px;
  animation:nameGlow 3s ease-in-out infinite;
}
@keyframes nameGlow{
  0%,100%{text-shadow:0 0 20px currentColor}
  50%{text-shadow:0 0 40px currentColor,0 0 80px currentColor}
}
.ghost-hindi{
  font-size:clamp(1rem,2.5vw,1.6rem);
  margin-bottom:16px;
  opacity:0.7;
  letter-spacing:0.1em;
}
.ghost-desc{
  font-size:0.9rem;line-height:1.9;
  color:rgba(170,200,255,0.7);
}
.ghost-legend{
  margin-top:16px;
  font-family:'Creepster',cursive;
  font-size:1.1rem;letter-spacing:0.15em;
  opacity:0.6;
}

/* specific ghost colors */
.c-blue{color:var(--ice-blue)}
.c-red{color:var(--blood-drip)}
.c-pale{color:#ddccff}
.c-white{color:#eeeeff}
.c-yellow{color:#ffcc44}
.c-green{color:#44ff88}

/* ══ AMBIENT FLOATING PARTICLES ══ */
.particles{position:fixed;inset:0;z-index:2;pointer-events:none}
.p-dot{
  position:absolute;
  border-radius:50%;
  animation:pfloat var(--pt,10s) linear var(--pd,0s) infinite;
  opacity:0;
}
@keyframes pfloat{
  0%{transform:translateY(110vh) scale(0);opacity:0}
  5%{opacity:var(--po,0.6)}
  95%{opacity:var(--po,0.6)}
  100%{transform:translateY(-10vh) scale(1.2);opacity:0}
}

/* ══ LAVA GLOW at sections ══ */
.lava-glow{
  position:absolute;bottom:0;left:0;right:0;height:200px;
  background:linear-gradient(to top,rgba(255,68,0,0.3),rgba(255,102,0,0.1),transparent);
  pointer-events:none;
  animation:lavaFlicker 2s ease-in-out infinite;
}
@keyframes lavaFlicker{
  0%,100%{opacity:0.6}50%{opacity:1}
}

/* ══ BLOOD RIVER ══ */
.blood-river{
  position:relative;width:100%;height:80px;overflow:hidden;
  background:transparent;
  margin:0;
}
.blood-river svg{width:100%;height:100%;display:block}

/* ══ SCROLL TEXT HORROR ══ */
.scroll-horror{
  position:relative;z-index:10;
  padding:40px 20px;
  text-align:center;
  background:linear-gradient(135deg,rgba(80,0,0,0.15),rgba(0,0,80,0.15));
}
.scroll-horror h2{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.5rem,4vw,3rem);
  color:var(--blood-drip);
  text-shadow:0 0 30px var(--blood),0 0 60px var(--blood-bright);
  letter-spacing:0.2em;
  animation:scrollH 4s ease-in-out infinite;
}
@keyframes scrollH{
  0%,100%{text-shadow:0 0 30px var(--blood),0 0 60px var(--blood-bright)}
  50%{text-shadow:0 0 60px var(--blood-drip),0 0 100px var(--blood-bright),0 0 5px #fff}
}

/* ══ FINAL SECTION ══ */
.final-section{
  position:relative;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;
  background:radial-gradient(ellipse at 50% 50%,#100005,#000000);
  overflow:hidden;
  text-align:center;
}

.final-name{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(5rem,18vw,14rem);
  font-weight:900;
  letter-spacing:0.1em;
  position:relative;
  animation:finalPulse 1.5s ease-in-out infinite;
}
.fn-back{
  color:transparent;
  -webkit-text-stroke:2px rgba(139,0,0,0.4);
}
.fn-front{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#fff 0%,var(--blood-drip) 30%,var(--blood) 60%,#000 100%);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
  animation:bloodRun 3s ease-in-out infinite;
}
@keyframes bloodRun{
  0%,100%{background-position:0 0}
  50%{background-position:0 30px}
}
@keyframes finalPulse{
  0%,100%{filter:drop-shadow(0 0 40px var(--blood)) drop-shadow(0 0 80px var(--blood-drip))}
  50%{filter:drop-shadow(0 0 80px var(--blood-drip)) drop-shadow(0 0 120px var(--blood-bright)) drop-shadow(0 0 8px #fff4)}
}

.final-tagline{
  font-family:'Creepster',cursive;
  font-size:clamp(1rem,3vw,2rem);
  letter-spacing:0.4em;
  color:var(--blood-drip);
  text-shadow:0 0 20px var(--blood);
  margin-top:20px;
  animation:tagFlk 7s step-end infinite;
}
@keyframes tagFlk{0%,87%,91%,100%{opacity:1}88%{opacity:0}90%{opacity:0.5}}

/* ══ RANDOM FLICKER OVERLAY ══ */
#flicker-overlay{
  position:fixed;inset:0;z-index:9997;
  background:rgba(100,0,0,0.15);
  pointer-events:none;opacity:0;
}

/* ══ LIGHTNING ══ */
#lightning{
  position:fixed;inset:0;z-index:9996;
  pointer-events:none;opacity:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(80,80,255,0.3),transparent 70%);
  transition:opacity 0.05s;
}

/* ══ MOBILE ══ */
@media(max-width:600px){
  .ghost-content{padding:30px 20px}
  .blood-title{-webkit-text-stroke:2px var(--blood-drip)}
}
</style>
</head>
<body>

<script>
/* ══════════════════════════════════
   SILENT BGM AUTOPLAY (IMPROVED)
   - Attempt muted autoplay (most browsers allow this)
   - On first user gesture (click/scroll/pointerdown/keydown/wheel), unmute and resume playback
══════════════════════════════════ */
(function(){
  var a = document.getElementById('bgm');
  if(!a) return;

  // Ensure loop + preload
  a.loop = true;
  a.preload = 'auto';

  // Try to play. If autoplay is blocked, playing muted first increases chance.
  function tryPlay(){
    try{
      var p = a.play();
      if(p && typeof p.then === 'function'){
        p.catch(function(){
          // ignore - will wait for user gesture
        });
      }
    }catch(e){}
  }

  // Start muted autoplay: browsers usually allow muted playback
  a.muted = true;
  tryPlay();

  // On first real user gesture, unmute and play (this is a user gesture -> allowed)
  var events = ['click','pointerdown','touchstart','keydown','wheel','scroll'];
  function onFirstGesture(){
    // Unmute only in response to a gesture
    a.muted = false;
    tryPlay();
    events.forEach(function(ev){ document.removeEventListener(ev,onFirstGesture,{passive:true}); });
  }

  events.forEach(function(ev){ document.addEventListener(ev,onFirstGesture,{passive:true}); });

  // Also try visibilitychange: when tab becomes visible attempt to resume (if user previously interacted)
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'visible') tryPlay();
  });
})();

/* ══════════════════════════════════
   MOUNTAIN + LAVA CANVAS
   (rest of original script unchanged)
══════════════════════════════════ */

      stars.push({x:Math.random()*W,y:Math.random()*H*0.6,r:Math.random()*1.5,a:Math.random(),t:Math.random()*Math.PI*2});
    }
  }

})();
</script>
